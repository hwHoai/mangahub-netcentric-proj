syntax = "proto3";

package sample;

option go_package = "mangahub/proto/sample;sample";

// SampleRequest contains the input payload for sample RPC calls.
message SampleRequest {
  string name = 1;
}

// SampleResponse contains the response payload returned by sample RPC calls.
message SampleResponse {
  string message = 1;
}

// SampleService provides sample RPC endpoints for demonstration purposes.
service SampleService {
  // SampleMethod returns a sample response message for the provided request.
  rpc SampleMethod(SampleRequest) returns (SampleResponse);
}

