syntax = "proto3";

package manga;

option go_package = "mangahub/proto/manga;manga";

message Chapter {
	string id = 1;
	string title = 2;
	int32 chapter_number = 3;
	string pages_data = 4;
	string created_at = 5;
	string updated_at = 6;
}

message Manga {
	string id = 1;
	string title = 2;
	string author = 3;
	int32 total_chapters = 4;
	string description = 5;
	string cover_url = 6;
	string status = 7;
	string created_at = 8;
	string updated_at = 9;
}

message MangaListRequest {
	int32 limit = 1;
	int32 offset = 2;
}

message MangaListResponse {
	repeated Manga mangas = 1;
}

message MangaDetailRequest {
	string id = 1;
}

message MangaDetailResponse {
	Manga manga = 1;
}

message MangaChaptersRequest {
	string id = 1;
}

message MangaChaptersResponse {
	repeated Chapter chapters = 1;
}

message CheckMangaExistsRequest {
	string id = 1;
}

message CheckMangaExistsResponse {
	bool exists = 1;
}

service GRPCMangaService {
	rpc GetMangas(MangaListRequest) returns (MangaListResponse);
	rpc GetMangaDetail(MangaDetailRequest) returns (MangaDetailResponse);
	rpc GetMangaChapters(MangaChaptersRequest) returns (MangaChaptersResponse);
	rpc CheckMangaExists(CheckMangaExistsRequest) returns (CheckMangaExistsResponse);
}
