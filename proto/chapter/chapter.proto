syntax = "proto3";

package chapter;

option go_package = "mangahub/proto/chapter";

message GetChapterByIDRequest {
    string chapter_id = 1;
}

message GetChapterByIDResponse {
    string id = 1;
    string manga_id = 2;
    double chapter_number = 3;
    string title = 4;
    string pages_data = 5;
    string created_at = 6;
    string updated_at = 7;
}

service GRPCChapterService {
    rpc GetChapterByID(GetChapterByIDRequest) returns (GetChapterByIDResponse);
}
